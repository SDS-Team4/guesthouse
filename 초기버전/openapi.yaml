openapi: 3.0.3
info:
  title: Guesthouse Reservation API
  version: 1.1.0
  description: |
    게스트하우스 예약 시스템 OpenAPI 명세.
    기준 문서: API_SPEC.md, SRS.md, ERD.
    비밀번호 찾기/재설정 API는 TBD-001 확정 전까지 본 명세에서 제외한다.
servers:
  - url: https://api.guesthouse.local
    description: Example guest API endpoint
  - url: https://ops-api.guesthouse.local
    description: Example host/admin API endpoint
tags:
  - name: Auth
  - name: Guest
  - name: Host
  - name: Admin

paths:
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpResponse"
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK (세션 생성)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      security:
        - cookieAuth: []
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/auth/password:
    patch:
      tags: [Auth]
      summary: 비밀번호 변경
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/auth/find-id/request:
    post:
      tags: [Auth]
      summary: 아이디 찾기 인증 요청
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FindIdRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/auth/find-id/verify:
    post:
      tags: [Auth]
      summary: 아이디 찾기 인증 검증
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FindIdVerifyRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindIdVerifyResponse"

  /api/v1/guest/accommodations:
    get:
      tags: [Guest]
      summary: 숙소 검색
      parameters:
        - in: query
          name: regions
          required: true
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
        - in: query
          name: checkIn
          required: true
          schema: { type: string, format: date }
        - in: query
          name: checkOut
          required: true
          schema: { type: string, format: date }
        - in: query
          name: guestCount
          required: true
          schema: { type: integer, minimum: 1 }
        - in: query
          name: page
          schema: { type: integer, default: 0, minimum: 0 }
        - in: query
          name: size
          schema: { type: integer, default: 20, minimum: 1 }
        - in: query
          name: sort
          schema: { type: string, example: basePrice, asc }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccommodationSearchResponse"

  /api/v1/guest/accommodations/{accommodationId}:
    get:
      tags: [Guest]
      summary: 숙소 상세 조회
      parameters:
        - $ref: "#/components/parameters/AccommodationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccommodationDetailResponse"
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/guest/room-types/{roomTypeId}/availability:
    get:
      tags: [Guest]
      summary: 객실 타입 예약 현황 조회
      parameters:
        - $ref: "#/components/parameters/RoomTypeId"
        - in: query
          name: from
          required: true
          schema: { type: string, format: date }
        - in: query
          name: to
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomTypeAvailabilityResponse"

  /api/v1/guest/reservations:
    post:
      tags: [Guest]
      summary: 예약 요청 생성
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReservationResponse"
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/guest/reservations/me:
    get:
      tags: [Guest]
      summary: 내 예약 목록 조회
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ReservationStatus"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyReservationsResponse"

  /api/v1/guest/reservations/{reservationId}:
    get:
      tags: [Guest]
      summary: 내 예약 상세 조회
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ReservationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationDetailResponse"
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/guest/reservations/{reservationId}/cancel:
    patch:
      tags: [Guest]
      summary: 예약 취소 (게스트)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ReservationId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/host/accommodations:
    get:
      tags: [Host]
      summary: 호스트 숙소 목록 조회
      security:
        - cookieAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostAccommodationsResponse"
    post:
      tags: [Host]
      summary: 숙소 등록
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccommodationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccommodationResponse"

  /api/v1/host/accommodations/{accommodationId}:
    patch:
      tags: [Host]
      summary: 숙소 수정
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/AccommodationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccommodationRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/accommodations/{accommodationId}/deactivate:
    patch:
      tags: [Host]
      summary: 숙소 비활성화
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/AccommodationId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/room-types:
    post:
      tags: [Host]
      summary: 객실 타입 생성
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomTypeRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    get:
      tags: [Host]
      summary: 객실 타입 목록 조회
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: accommodationId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/room-types/{roomTypeId}:
    patch:
      tags: [Host]
      summary: 객실 타입 수정
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RoomTypeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomTypeRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    delete:
      tags: [Host]
      summary: 객실 타입 삭제/비활성화
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RoomTypeId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/rooms:
    post:
      tags: [Host]
      summary: 개별 객실 생성
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    get:
      tags: [Host]
      summary: 개별 객실 목록 조회
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: accommodationId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/rooms/{roomId}:
    patch:
      tags: [Host]
      summary: 개별 객실 수정
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    delete:
      tags: [Host]
      summary: 개별 객실 삭제/비활성화
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/price-policies:
    post:
      tags: [Host]
      summary: 가격 정책 생성
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePricePolicyRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    get:
      tags: [Host]
      summary: 가격 정책 목록 조회
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: accommodationId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/price-policies/{policyId}:
    patch:
      tags: [Host]
      summary: 가격 정책 수정
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePricePolicyRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    delete:
      tags: [Host]
      summary: 가격 정책 삭제
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/blocks:
    post:
      tags: [Host]
      summary: Block 생성
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlockRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    get:
      tags: [Host]
      summary: Block 조회
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: accommodationId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/blocks/{blockId}:
    patch:
      tags: [Host]
      summary: Block 수정
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/BlockId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlockRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    delete:
      tags: [Host]
      summary: Block 해제(비활성화)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/BlockId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/reservations:
    get:
      tags: [Host]
      summary: 예약 목록 조회
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: accommodationId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/host/reservations/{reservationId}/approve:
    patch:
      tags: [Host]
      summary: 예약 승인
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ReservationId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/host/reservations/{reservationId}/cancel:
    patch:
      tags: [Host]
      summary: 예약 취소 (호스트)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ReservationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostCancelReservationRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/host/reservations/{reservationId}/nights/{stayDate}/room:
    patch:
      tags: [Host]
      summary: 숙박일 단위 객실 재배정
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ReservationId"
        - in: path
          name: stayDate
          required: true
          schema: { type: string, format: date }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId]
              properties:
                roomId:
                  type: integer
                  format: int64
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/users:
    get:
      tags: [Admin]
      summary: 회원 목록 조회
      security:
        - cookieAuth: []
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/users/{userId}:
    get:
      tags: [Admin]
      summary: 회원 상세 조회
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    patch:
      tags: [Admin]
      summary: 회원 정보 수정
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/auth-requests:
    get:
      tags: [Admin]
      summary: 권한 요청 목록 조회
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/AuthRequestStatus"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/auth-requests/{requestId}:
    patch:
      tags: [Admin]
      summary: 권한 요청 처리
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminHandleAuthRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/audit-logs:
    get:
      tags: [Admin]
      summary: 감사 로그 조회
      security:
        - cookieAuth: []
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/system-logs:
    get:
      tags: [Admin]
      summary: 시스템 로그 조회
      security:
        - cookieAuth: []
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/terms:
    get:
      tags: [Admin]
      summary: 약관 목록 조회
      security:
        - cookieAuth: []
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    post:
      tags: [Admin]
      summary: 약관 등록
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTermRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/terms/{termsId}:
    patch:
      tags: [Admin]
      summary: 약관 수정
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: termsId
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTermRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/notifications:
    get:
      tags: [Admin]
      summary: 공지 목록 조회
      security:
        - cookieAuth: []
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    post:
      tags: [Admin]
      summary: 공지 등록
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/notifications/{noticeId}:
    patch:
      tags: [Admin]
      summary: 공지 수정
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/NoticeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationRequest"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }
    delete:
      tags: [Admin]
      summary: 공지 삭제
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/NoticeId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/notifications/{noticeId}/attachments:
    post:
      tags: [Admin]
      summary: 공지 첨부 업로드
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/NoticeId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/notifications/{noticeId}/attachments/{attachmentId}:
    delete:
      tags: [Admin]
      summary: 공지 첨부 삭제
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/NoticeId"
        - $ref: "#/components/parameters/AttachmentId"
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

  /api/v1/admin/operations/summary:
    get:
      tags: [Admin]
      summary: 운영 현황 요약
      security:
        - cookieAuth: []
      responses:
        "200": { $ref: "#/components/responses/OkNoData" }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: SESSION

  parameters:
    AccommodationId:
      in: path
      name: accommodationId
      required: true
      schema: { type: integer, format: int64 }
    RoomTypeId:
      in: path
      name: roomTypeId
      required: true
      schema: { type: integer, format: int64 }
    ReservationId:
      in: path
      name: reservationId
      required: true
      schema: { type: integer, format: int64 }
    RoomId:
      in: path
      name: roomId
      required: true
      schema: { type: integer, format: int64 }
    PolicyId:
      in: path
      name: policyId
      required: true
      schema: { type: integer, format: int64 }
    BlockId:
      in: path
      name: blockId
      required: true
      schema: { type: integer, format: int64 }
    UserId:
      in: path
      name: userId
      required: true
      schema: { type: integer, format: int64 }
    RequestId:
      in: path
      name: requestId
      required: true
      schema: { type: integer, format: int64 }
    NoticeId:
      in: path
      name: noticeId
      required: true
      schema: { type: integer, format: int64 }
    AttachmentId:
      in: path
      name: attachmentId
      required: true
      schema: { type: integer, format: int64 }

  responses:
    OkNoData:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessEnvelope"
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { type: object, nullable: true }
        timestamp: { type: string, format: date-time }

    ErrorEnvelope:
      type: object
      required: [success, errorCode, message, timestamp]
      properties:
        success: { type: boolean, example: false }
        errorCode: { type: string, example: VALIDATION_FAILED }
        message: { type: string }
        timestamp: { type: string, format: date-time }
        traceId: { type: string }

    UserRole:
      type: string
      enum: [GUEST, HOST, ADMIN]

    UserStatus:
      type: string
      enum: [ACTIVE, INACTIVE, SUSPENDED]

    ReservationStatus:
      type: string
      enum: [PENDING, APPROVED, CANCELLED]

    AuthRequestStatus:
      type: string
      enum: [PENDING, APPROVED, DENIED]

    AccommodationStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    RoomStatus:
      type: string
      enum: [AVAILABLE, UNAVAILABLE, MAINTENANCE]

    PriceType:
      type: string
      enum: [DELTA, PERCENT]

    PublishStatus:
      type: string
      enum: [PUBLISHED, DRAFT, ARCHIVED]

    SignUpRequest:
      type: object
      required: [loginId, password, name, email, phone, termsAgreed]
      properties:
        loginId: { type: string, minLength: 5, maxLength: 25 }
        password: { type: string, minLength: 10 }
        name: { type: string, minLength: 1, maxLength: 50 }
        email: { type: string, format: email }
        phone: { type: string }
        termsAgreed: { type: boolean }

    SignUpResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                userId: { type: integer, format: int64 }
                roles: { $ref: "#/components/schemas/UserRole" }
                status: { $ref: "#/components/schemas/UserStatus" }

    LoginRequest:
      type: object
      required: [loginId, password]
      properties:
        loginId: { type: string }
        password: { type: string }

    LoginResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                userId: { type: integer, format: int64 }
                roles: { $ref: "#/components/schemas/UserRole" }

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword, newPasswordConfirm]
      properties:
        currentPassword: { type: string }
        newPassword: { type: string, minLength: 10 }
        newPasswordConfirm: { type: string, minLength: 10 }

    FindIdRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }

    FindIdVerifyRequest:
      type: object
      required: [verificationCode]
      properties:
        verificationCode: { type: string }

    FindIdVerifyResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                loginId: { type: string }

    AccommodationSummary:
      type: object
      properties:
        accommodationId: { type: integer, format: int64 }
        name: { type: string }
        region: { type: string }
        statusGroup: { type: string, enum: [AVAILABLE, MISMATCH, SOLD_OUT] }
        minPrice: { type: number }

    AccommodationSearchResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                page: { type: integer }
                size: { type: integer }
                total: { type: integer }
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/AccommodationSummary"

    AccommodationDetailResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                accommodationId: { type: integer, format: int64 }
                name: { type: string }
                address: { type: string }
                region: { type: string }
                infoText: { type: string }
                checkInTime: { type: string, example: "15:00:00" }
                checkOutTime: { type: string, example: "11:00:00" }
                status: { $ref: "#/components/schemas/AccommodationStatus" }

    RoomTypeAvailabilityResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                roomTypeId: { type: integer, format: int64 }
                calendar:
                  type: array
                  items:
                    type: object
                    properties:
                      stayDate: { type: string, format: date }
                      availableCount: { type: integer }
                      soldOut: { type: boolean }

    CreateReservationRequest:
      type: object
      required: [accommodationId, roomTypeId, checkIn, checkOut, guestCount]
      properties:
        accommodationId: { type: integer, format: int64 }
        roomTypeId: { type: integer, format: int64 }
        checkIn: { type: string, format: date }
        checkOut: { type: string, format: date }
        guestCount: { type: integer, minimum: 1 }
        requestMemo: { type: string, maxLength: 1000 }

    CreateReservationResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                reservationId: { type: integer, format: int64 }
                reservationNo: { type: string }
                status: { $ref: "#/components/schemas/ReservationStatus" }
                requestedTime: { type: string, format: date-time }

    MyReservationsResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  reservationId: { type: integer, format: int64 }
                  reservationNo: { type: string }
                  accommodationName: { type: string }
                  roomTypeName: { type: string }
                  checkInDate: { type: string, format: date }
                  checkOutDate: { type: string, format: date }
                  status: { $ref: "#/components/schemas/ReservationStatus" }

    ReservationDetailResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                reservationId: { type: integer, format: int64 }
                reservationNo: { type: string }
                userId: { type: integer, format: int64 }
                accommodationId: { type: integer, format: int64 }
                roomTypeId: { type: integer, format: int64 }
                roomId: { type: integer, format: int64, nullable: true }
                checkInDate: { type: string, format: date }
                checkOutDate: { type: string, format: date }
                status: { $ref: "#/components/schemas/ReservationStatus" }
                requestedTime: { type: string, format: date-time }

    CreateAccommodationRequest:
      type: object
      required: [name, address, region, checkInTime, checkOutTime]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        address: { type: string, minLength: 1, maxLength: 255 }
        region: { type: string, minLength: 1, maxLength: 50 }
        infoText: { type: string }
        checkInTime: { type: string, example: "15:00:00" }
        checkOutTime: { type: string, example: "11:00:00" }

    CreateAccommodationResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                accommodationId: { type: integer, format: int64 }
                hostId: { type: integer, format: int64 }
                status: { $ref: "#/components/schemas/AccommodationStatus" }

    UpdateAccommodationRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        address: { type: string, minLength: 1, maxLength: 255 }
        region: { type: string, minLength: 1, maxLength: 50 }
        infoText: { type: string }
        checkInTime: { type: string }
        checkOutTime: { type: string }
        status: { $ref: "#/components/schemas/AccommodationStatus" }

    CreateRoomTypeRequest:
      type: object
      required: [accommodationId, name, maxCapacity, basePrice]
      properties:
        accommodationId: { type: integer, format: int64 }
        name: { type: string, minLength: 1, maxLength: 50 }
        maxCapacity: { type: integer, minimum: 1 }
        basePrice: { type: integer, minimum: 0 }
        infoText: { type: string }

    UpdateRoomTypeRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 50 }
        maxCapacity: { type: integer, minimum: 1 }
        basePrice: { type: integer, minimum: 0 }
        infoText: { type: string }
        status: { $ref: "#/components/schemas/AccommodationStatus" }

    CreateRoomRequest:
      type: object
      required: [roomTypeId, accommodationId, roomCode, status]
      properties:
        roomTypeId: { type: integer, format: int64 }
        accommodationId: { type: integer, format: int64 }
        roomCode: { type: string, minLength: 1, maxLength: 20 }
        status: { $ref: "#/components/schemas/RoomStatus" }
        memo: { type: string }

    UpdateRoomRequest:
      type: object
      properties:
        status: { $ref: "#/components/schemas/RoomStatus" }
        memo: { type: string }

    CreatePricePolicyRequest:
      type: object
      required:
        [
          accommodationId,
          roomTypeId,
          policyName,
          startDate,
          endDate,
          priceValue,
          priceType,
        ]
      properties:
        accommodationId: { type: integer, format: int64 }
        roomTypeId: { type: integer, format: int64 }
        policyName: { type: string, minLength: 1, maxLength: 50 }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        priceValue: { type: number, format: double, minimum: 0 }
        priceType: { $ref: "#/components/schemas/PriceType" }
        dayOfWeekMask: { type: integer, minimum: 0 }

    UpdatePricePolicyRequest:
      type: object
      properties:
        policyName: { type: string, minLength: 1, maxLength: 50 }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        priceValue: { type: number, format: double, minimum: 0 }
        priceType: { $ref: "#/components/schemas/PriceType" }
        status: { $ref: "#/components/schemas/AccommodationStatus" }
        dayOfWeekMask: { type: integer, minimum: 0 }

    CreateBlockRequest:
      type: object
      required: [accommodationId, roomTypeId, roomId, startDate, endDate]
      properties:
        accommodationId: { type: integer, format: int64 }
        roomTypeId: { type: integer, format: int64 }
        roomId: { type: integer, format: int64 }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        reasonType: { type: string, maxLength: 50 }

    UpdateBlockRequest:
      type: object
      properties:
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        reasonType: { type: string, maxLength: 50 }
        status: { $ref: "#/components/schemas/AccommodationStatus" }

    HostCancelReservationRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 500 }
        restoreInventory: { type: boolean, default: true }

    AdminUpdateUserRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 50 }
        email: { type: string, format: email }
        phone: { type: string }
        status: { $ref: "#/components/schemas/UserStatus" }
        roles: { $ref: "#/components/schemas/UserRole" }

    AdminHandleAuthRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [APPROVED, DENIED] }
        reason: { type: string, maxLength: 500 }

    CreateTermRequest:
      type: object
      required: [category, title, content, isRequired, status, effectiveDate]
      properties:
        category: { type: string, enum: [SERVICE, PRIVACY, MARKETING] }
        title: { type: string, minLength: 1, maxLength: 100 }
        content: { type: string }
        version: { type: string, maxLength: 50 }
        isRequired: { type: boolean }
        status: { $ref: "#/components/schemas/PublishStatus" }
        effectiveDate: { type: string, format: date-time }

    UpdateTermRequest:
      type: object
      properties:
        title: { type: string, minLength: 1, maxLength: 100 }
        content: { type: string }
        version: { type: string, maxLength: 50 }
        isRequired: { type: boolean }
        status: { $ref: "#/components/schemas/PublishStatus" }
        effectiveDate: { type: string, format: date-time }

    CreateNotificationRequest:
      type: object
      required: [title, content, status]
      properties:
        title: { type: string, minLength: 1, maxLength: 100 }
        content: { type: string }
        status: { $ref: "#/components/schemas/PublishStatus" }
        isPinned: { type: boolean, default: false }

    UpdateNotificationRequest:
      type: object
      properties:
        title: { type: string, minLength: 1, maxLength: 100 }
        content: { type: string }
        status: { $ref: "#/components/schemas/PublishStatus" }
        isPinned: { type: boolean }

    HostAccommodationsResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  accommodationId: { type: integer, format: int64 }
                  name: { type: string }
                  region: { type: string }
                  status: { $ref: "#/components/schemas/AccommodationStatus" }
